<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safira Jóias - Coleções Exclusivas</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Cabeçalho Preto com detalhe Dourado -->
    <header class="site-header">
        <div class="logo-placeholder">SAFIRA</div> <!-- Substitua por <img src="logo.png"> -->
    </header>

    <section class="hero">
        <div class="hero-rule"></div>
        <h1 class="hero-tagline">Coleções Exclusivas</h1>
        <p class="hero-sub">Alta Joalheria</p>
    </section>

    <section class="products-section">
        <main class="products-grid">
            <!-- Os cards continuam a seguir o mesmo padrão -->
            <div class="card">
                <div class="card-image-wrap">
                    <img src="modelos/anel.jpg" alt="Joia">
                </div>
                <div class="card-body">
                    <h3 class="card-name">Aliança Elegance</h3>
                    <p class="card-price">R$ 199,00</p>
                    <a href="#" class="btn-whatsapp">Conversar</a>
                </div>
            </div>
            <!-- Adicione os outros cards aqui... -->
        </main>
    </section>

    <!-- Rodapé Preto e Dourado -->
    <footer class="site-footer">
        <p class="footer-copy">&copy; 2026 Safira Jóias. Elegância em cada detalhe.</p>
    </footer>

    <!-- Botão Flutuante Corrigido -->
    <a href="#" class="float-cta">
        <img src="whatsapp.svg" alt="WhatsApp">
        <span>Atendimento</span>
    </a>

</body>
</html>
