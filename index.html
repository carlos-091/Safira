<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Loja de Joias</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 0;
      text-align: center;
    }

    header {
      background: #111;
      color: white;
      padding: 20px;
      font-size: 24px;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .produto {
      background: white;
      padding: 10px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
      transition: 0.3s;
    }

    .produto:hover {
      transform: scale(1.05);
    }

    .produto img {
      width: 100%;
      border-radius: 10px;
    }

    .produto h3 {
      margin: 10px 0;
      font-size: 16px;
    }
  </style>
</head>

<body>

<header>
  Loja de Joias
</header>

<div class="container">

  <!-- COLARES -->
  <div class="produto">
    <img src="colar_1.jpg" alt="colar_1">
    <h3>colar_1</h3>
  </div>

  <div class="produto">
    <img src="colar_2.jpg(1).jpg" alt="colar_2">
    <h3>colar_2</h3>
  </div>

  <div class="produto">
    <img src="colar_3.jpg(1).jpg" alt="colar_3">
    <h3>colar_3</h3>
  </div>

  <div class="produto">
    <img src="colar_4.jpg(1).jpg" alt="colar_4">
    <h3>colar_4</h3>
  </div>

  <!-- PULSEIRAS -->
  <div class="produto">
    <img src="pulseira_1.jpg(1).jpg" alt="pulseira_1">
    <h3>pulseira_1</h3>
  </div>

  <div class="produto">
    <img src="pulseira_2.jpg(1).jpg" alt="pulseira_2">
    <h3>pulseira_2</h3>
  </div>

  <div class="produto">
    <img src="pulseira_3.jpg(1).jpg" alt="pulseira_3">
    <h3>pulseira_3</h3>
  </div>

</div>

</body>
</html>
