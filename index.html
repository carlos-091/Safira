<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>BlueGem Marketplace</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="logo">BlueGem</div>

    <div class="search-box">
        <input type="text" placeholder="Buscar joias...">
        <button>Buscar</button>
    </div>

    <nav>
        <a href="#">Entrar</a>
        <a href="#">Carrinho</a>
    </nav>
</header>

<section class="categorias">
    <button>Anéis</button>
    <button>Colares</button>
    <button>Brincos</button>
    <button>Pulseiras</button>
</section>

<section class="produtos">
    <div class="card">
        <img src="https://via.placeholder.com/200">
        <h3>Anel Safira</h3>
        <p class="preco">R$ 299,00</p>
        <button class="comprar">Comprar</button>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/200">
        <h3>Colar Luxo</h3>
        <p class="preco">R$ 399,00</p>
        <button class="comprar">Comprar</button>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/200">
        <h3>Brinco Elegante</h3>
        <p class="preco">R$ 199,00</p>
        <button class="comprar">Comprar</button>
    </div>
</section>

</body>
</html>
